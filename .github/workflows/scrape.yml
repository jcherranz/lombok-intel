name: Daily Lombok Scrape

on:
  schedule:
    # Run daily at 2 AM UTC (9 AM WIB / Lombok time)
    - cron: '0 2 * * *'
  workflow_dispatch: {}  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database (if needed)
        run: python -m src.db.init_db

      - name: Run Airbnb scraper
        run: python -m src.scrapers.airbnb_scraper
        continue-on-error: true

      - name: Run Booking.com scraper
        run: python -m src.scrapers.booking_scraper
        continue-on-error: true

      - name: Run occupancy inference
        run: python -m src.pipeline.occupancy_engine
        continue-on-error: true

      - name: Run ADR calculator
        run: python -m src.pipeline.adr_calculator
        continue-on-error: true

      - name: Export Excel snapshot
        run: python -m src.export_excel
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config user.name "Lombok Intel Bot"
          git config user.email "actions@github.com"
          git add data/lombok_intel.db data/lombok_intel.xlsx
          git diff --staged --quiet || git commit -m "data: daily scrape $(date -u +%Y-%m-%d)"
          git push

  notify-failure:
    runs-on: ubuntu-latest
    needs: scrape
    if: failure()
    steps:
      - name: Notify on failure
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily scrape failed — ${new Date().toISOString().slice(0,10)}`,
              body: `The daily scrape workflow failed. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'automated']
            })
