name: Daily Lombok Scrape

on:
  schedule:
    # Run daily at 2 AM UTC (9 AM WIB / Lombok time)
    - cron: '0 2 * * *'
  workflow_dispatch: {}  # Allow manual trigger

concurrency:
  group: scrape-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run tests
        run: pytest tests/ -x -q

      - name: Initialize database (if needed)
        run: python -m src.db.init_db

      - name: Run Airbnb scraper
        run: python -m src.scrapers.airbnb_scraper

      - name: Run Booking.com scraper
        run: python -m src.scrapers.booking_scraper

      - name: Validate scrape results
        run: |
          python -c "
          import sqlite3
          conn = sqlite3.connect('data/lombok_intel.db')
          row = conn.execute(
              \"SELECT run_id, snapshots_added FROM scrape_runs ORDER BY run_id DESC LIMIT 1\"
          ).fetchone()
          if row is None:
              raise SystemExit('FAIL: no scrape runs found')
          run_id = row[0]
          snapshots = row[1] if row[1] is not None else 0
          print(f'Latest run #{run_id}: {snapshots} snapshots added')
          if snapshots == 0:
              raise SystemExit(f'FAIL: run #{run_id} added zero snapshots')
          "

      - name: Run occupancy inference
        run: python -m src.pipeline.occupancy_engine
        continue-on-error: true

      - name: Run ADR calculator
        run: python -m src.pipeline.adr_calculator

      - name: Export Excel snapshot
        run: python -m src.export_excel

      - name: Archive old snapshots (180+ days)
        run: python -m src.db.archive
        continue-on-error: true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-logs-${{ github.run_id }}
          path: data/logs/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload DB backup (private artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: data/lombok_intel.db
          retention-days: 30

      - name: Commit updated data
        run: |
          git config user.name "Lombok Intel Bot"
          git config user.email "actions@github.com"
          git add data/lombok_intel.db data/lombok_intel.xlsx
          git diff --staged --quiet || git commit -m "data: daily scrape $(date -u +%Y-%m-%d)"
          git push

      - name: Send Telegram notification (success)
        if: success()
        run: |
          python -c "
          from src.utils import notify_telegram
          import sqlite3
          conn = sqlite3.connect('data/lombok_intel.db')
          row = conn.execute('SELECT run_id, listings_seen, snapshots_added, status FROM scrape_runs ORDER BY run_id DESC LIMIT 1').fetchone()
          airbnb = conn.execute('SELECT COUNT(*) FROM airbnb_listings WHERE is_active=1').fetchone()[0]
          booking = conn.execute('SELECT COUNT(*) FROM booking_listings WHERE is_active=1').fetchone()[0]
          msg = f'*Lombok Intel - Daily Scrape OK*\n'
          msg += f'Run #{row[0]}: {row[1]} listings, {row[2]} snapshots\n'
          msg += f'Active: {airbnb} Airbnb + {booking} Booking\n'
          msg += f'Status: {row[3]}'
          notify_telegram(msg)
          "
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

      - name: Send Telegram notification (failure)
        if: failure()
        run: |
          python -c "
          from src.utils import notify_telegram
          notify_telegram('*Lombok Intel - Daily Scrape FAILED*\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          "
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

      - name: Weekly summary issue (Mondays only)
        if: success() && github.event.schedule == '0 2 * * *'
        uses: actions/github-script@v7
        with:
          script: |
            const day = new Date().getUTCDay();
            if (day !== 1) return; // Monday = 1
            const { execSync } = require('child_process');
            const summary = execSync(`python -c "
            import sqlite3, json
            conn = sqlite3.connect('data/lombok_intel.db')
            airbnb = conn.execute('SELECT COUNT(*) FROM airbnb_listings WHERE is_active=1').fetchone()[0]
            booking = conn.execute('SELECT COUNT(*) FROM booking_listings WHERE is_active=1').fetchone()[0]
            runs = conn.execute('SELECT COUNT(*) FROM scrape_runs WHERE started_at >= date(\\\"now\\\", \\\"-7 days\\\")').fetchone()[0]
            errors = conn.execute('SELECT COUNT(*) FROM scrape_runs WHERE status=\\\"failed\\\" AND started_at >= date(\\\"now\\\", \\\"-7 days\\\")').fetchone()[0]
            adr_rows = conn.execute('SELECT zone_id, adr FROM v_adr_simple ORDER BY zone_id').fetchall()
            adr_summary = '\\n'.join(['  - ' + str(r[0]) + ': $' + str(int(r[1])) for r in adr_rows]) if adr_rows else '  No ADR data yet'
            print(json.dumps({'airbnb': airbnb, 'booking': booking, 'runs': runs, 'errors': errors, 'adr': adr_summary}))
            "`).toString().trim();
            const data = JSON.parse(summary);
            const date = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly Summary — ${date}`,
              body: `## Lombok Intel Weekly Report\n\n**Active Listings:** ${data.airbnb} Airbnb + ${data.booking} Booking.com\n**Scrape Runs (7d):** ${data.runs} total, ${data.errors} failed\n\n**ADR by Zone:**\n${data.adr}\n\n---\n_Auto-generated by GitHub Actions_`,
              labels: ['report', 'automated']
            });

  notify-failure:
    runs-on: ubuntu-latest
    needs: scrape
    if: failure()
    steps:
      - name: Notify on failure
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily scrape failed — ${new Date().toISOString().slice(0,10)}`,
              body: `The daily scrape workflow failed. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'automated']
            })
