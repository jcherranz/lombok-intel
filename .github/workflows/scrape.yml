name: Daily Lombok Scrape

on:
  schedule:
    # Run daily at 2 AM UTC (9 AM WIB / Lombok time)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_booking:
        description: 'Run Booking.com scraper (auto on Sundays)'
        type: boolean
        default: false

concurrency:
  group: scrape-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.x"
          enable-cache: true
          cache-dependency-glob: "requirements.txt"

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Verify critical imports
        run: |
          python -c "
          from playwright_stealth import Stealth
          s = Stealth()
          assert hasattr(s, 'apply_stealth_sync'), 'Stealth API missing'
          print('playwright-stealth OK')
          "

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run tests
        run: pytest tests/ -x -q

      - name: Restore DB from latest artifact
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Attempting to restore DB from latest artifact..."
          # Find the most recent successful run of this workflow on main
          LAST_RUN_ID=$(gh run list \
            --workflow scrape.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')
          if [ -n "$LAST_RUN_ID" ]; then
            echo "Downloading DB from run $LAST_RUN_ID..."
            gh run download "$LAST_RUN_ID" \
              --name "db-backup-$LAST_RUN_ID" \
              --dir data/ 2>/dev/null || true
            if [ -f "data/lombok_intel.db" ]; then
              ls -lh data/lombok_intel.db
              echo "DB restored from run $LAST_RUN_ID"
            else
              echo "Artifact download failed or expired"
            fi
          elif [ -f "data/lombok_intel.db" ]; then
            echo "No previous run found, but DB exists locally"
          else
            echo "No DB found, will initialize fresh"
          fi

      - name: Initialize database (if needed)
        run: python -m src.db.init_db

      - name: Run Airbnb scraper
        run: python -m src.scrapers.airbnb_scraper
        timeout-minutes: 180

      - name: Determine if Booking should run
        id: booking-check
        run: |
          DAY_OF_WEEK=$(date -u +%u)  # 7 = Sunday
          MANUAL_BOOKING="${{ github.event.inputs.run_booking }}"
          if [ "$DAY_OF_WEEK" = "7" ] || [ "$MANUAL_BOOKING" = "true" ]; then
            echo "run_booking=true" >> $GITHUB_OUTPUT
            echo "Booking.com scraper will run (day=$DAY_OF_WEEK, manual=$MANUAL_BOOKING)"
          else
            echo "run_booking=false" >> $GITHUB_OUTPUT
            echo "Skipping Booking.com scraper (runs on Sundays or manual trigger)"
          fi

      - name: Run Booking.com scraper (discovery only)
        if: steps.booking-check.outputs.run_booking == 'true'
        run: python -m src.scrapers.booking_scraper --skip-availability
        timeout-minutes: 60
        continue-on-error: true

      - name: Validate scrape results
        run: |
          python -c "
          import sqlite3
          conn = sqlite3.connect('data/lombok_intel.db')
          rows = conn.execute(
              \"SELECT run_id, source, COALESCE(snapshots_added, 0), status FROM scrape_runs WHERE started_at >= datetime('now', '-6 hours') ORDER BY run_id DESC\"
          ).fetchall()
          if not rows:
              raise SystemExit('FAIL: no scrape runs found in this workflow execution')
          for run_id, source, snaps, status in rows:
              print(f'Run #{run_id} ({source}): {snaps} snapshots, status={status}')
          # Require at least Airbnb data
          airbnb_runs = [r for r in rows if r[1] == 'airbnb']
          if not airbnb_runs or all(r[2] == 0 for r in airbnb_runs):
              raise SystemExit('FAIL: Airbnb run added zero snapshots')
          print('Validation passed')
          "

      - name: Run occupancy inference
        run: python -m src.pipeline.occupancy_engine
        continue-on-error: true

      - name: Prune old snapshots and VACUUM
        run: python -m src.db.archive --mode prune --keep-runs 3
        continue-on-error: true

      - name: Run ADR calculator
        run: python -m src.pipeline.adr_calculator

      - name: Export Excel snapshot
        run: python -m src.export_excel

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-logs-${{ github.run_id }}
          path: data/logs/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload DB backup (private artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: data/lombok_intel.db
          retention-days: 30

      - name: Commit updated data
        run: |
          git config user.name "Lombok Intel Bot"
          git config user.email "actions@github.com"
          git add data/lombok_intel.xlsx
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: daily scrape $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push

      - name: Send Telegram notification (success)
        if: success()
        run: |
          python -c "
          from src.utils import notify_telegram
          import sqlite3
          conn = sqlite3.connect('data/lombok_intel.db')
          # Get per-source summary from this execution
          runs = conn.execute(
              \"SELECT source, run_id, COALESCE(listings_seen, 0), COALESCE(snapshots_added, 0), status FROM scrape_runs WHERE started_at >= datetime('now', '-6 hours') ORDER BY source\"
          ).fetchall()
          airbnb_active = conn.execute('SELECT COUNT(*) FROM airbnb_listings WHERE is_active=1').fetchone()[0]
          booking_active = conn.execute('SELECT COUNT(*) FROM booking_listings WHERE is_active=1').fetchone()[0]
          msg = '*Lombok Intel - Daily Scrape OK*\n'
          for source, run_id, listings, snaps, status in runs:
              msg += f'{source.title()} #{run_id}: {listings} listings, {snaps} snapshots ({status})\n'
          msg += f'Active: {airbnb_active} Airbnb + {booking_active} Booking'
          notify_telegram(msg)
          "
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

      - name: Send Telegram notification (failure)
        if: failure()
        run: |
          python -c "
          from src.utils import notify_telegram
          notify_telegram('*Lombok Intel - Daily Scrape FAILED*\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          "
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

      - name: Weekly summary issue (Mondays only)
        if: success() && github.event.schedule == '0 2 * * *'
        uses: actions/github-script@v7
        with:
          script: |
            const day = new Date().getUTCDay();
            if (day !== 1) return; // Monday = 1
            const { execSync } = require('child_process');
            const summary = execSync(`python -c "
            import sqlite3, json
            conn = sqlite3.connect('data/lombok_intel.db')
            airbnb = conn.execute('SELECT COUNT(*) FROM airbnb_listings WHERE is_active=1').fetchone()[0]
            booking = conn.execute('SELECT COUNT(*) FROM booking_listings WHERE is_active=1').fetchone()[0]
            runs = conn.execute('SELECT COUNT(*) FROM scrape_runs WHERE started_at >= date(\\\"now\\\", \\\"-7 days\\\")').fetchone()[0]
            errors = conn.execute('SELECT COUNT(*) FROM scrape_runs WHERE status=\\\"failed\\\" AND started_at >= date(\\\"now\\\", \\\"-7 days\\\")').fetchone()[0]
            adr_rows = conn.execute('SELECT zone_id, adr FROM v_adr_simple ORDER BY zone_id').fetchall()
            adr_summary = '\\n'.join(['  - ' + str(r[0]) + ': $' + str(int(r[1])) for r in adr_rows]) if adr_rows else '  No ADR data yet'
            print(json.dumps({'airbnb': airbnb, 'booking': booking, 'runs': runs, 'errors': errors, 'adr': adr_summary}))
            "`).toString().trim();
            const data = JSON.parse(summary);
            const date = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly Summary — ${date}`,
              body: `## Lombok Intel Weekly Report\n\n**Active Listings:** ${data.airbnb} Airbnb + ${data.booking} Booking.com\n**Scrape Runs (7d):** ${data.runs} total, ${data.errors} failed\n\n**ADR by Zone:**\n${data.adr}\n\n---\n_Auto-generated by GitHub Actions_`,
              labels: ['report', 'automated']
            });

  notify-failure:
    runs-on: ubuntu-latest
    needs: scrape
    if: failure()
    steps:
      - name: Notify on failure
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily scrape failed — ${new Date().toISOString().slice(0,10)}`,
              body: `The daily scrape workflow failed. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'automated']
            })
